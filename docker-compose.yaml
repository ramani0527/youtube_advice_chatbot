version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: ./  # assumes Dockerfile is in project root
    container_name: youtube-bot-api
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: "http://qdrant:6333"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  